<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="utf-8">
    <title>Тверской район</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div id="sidebar">

    <h3>Слои</h3>

    <details open>
        <summary>Объекты культурного наследия</summary>
        <label><input type="checkbox" checked id="heritageCheck"> ОКН</label>
    </details>

    <details open>
        <summary>Велосипедная инфраструктура</summary>
        <label><input type="checkbox" checked id="bikeRoutesCheck"> Веломаршруты</label><br>
        <label><input type="checkbox" checked id="bikeParkingCheck"> Велопарковки</label>
    </details>

    <details open>
        <summary>Транспорт</summary>
        <label><input type="checkbox" checked id="stopsCheck"> Остановки</label>
    </details>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="js/map.js"></script>

</body>

</html>
