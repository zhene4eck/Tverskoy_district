<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="utf-8">
    <title>Тверской район</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div id="sidebar">

    <h3>Слои</h3>

    <div class="theme-layers-group">

    <details>
        <summary>Места</summary>

        <label>
            <input type="checkbox" checked id="heritageCheck">
            Объекты культурного наследия
        </label>

        <div class="legend-title">
            Легенда
        </div>

        <div class="heritage-legend">

            <!-- 1 -->

         </div>

    </details>

    <details open>
        <summary>Велосипедная инфраструктура</summary>
        <label><input type="checkbox" checked id="bikeRoutesCheck"> Веломаршруты</label><br>
        <label><input type="checkbox" checked id="bikeParkingCheck"> Велопарковки</label>
    </details>

    </div>

    <div class="base-layers-group">

    <details>
        <summary>Транспорт</summary>
        <label><input type="checkbox" checked id="stopsCheck"> Остановки общественного транспорта</label>
    </details>

    <details>
        <summary>Адресная информация</summary>
        <label><input type="checkbox" checked id="addressCheck"> Адресные точки</label>
    </details>

      <details>
        <summary>Пути и сообщения</summary>
        <label><input type="checkbox" checked id="railwaysCheck"> Железнодорожные и трамвайные пути</label>
    </details>

    <details>
        <summary>Городская инфраструктура</summary>
        <label><input type="checkbox" checked id="roadsCheck"> Дороги</label><br>
        <label><input type="checkbox" checked id="buildingsCheck"> Здания</label>
    </details>

    <details>
        <summary>Гидрография</summary>
        <label><input type="checkbox" checked id="waterCheck"> Водоёмы</label><br>
        <label><input type="checkbox" checked id="waterwaysCheck"> Русла</label>
    </details>

    <details>
        <summary>Растительность</summary>
        <label><input type="checkbox" checked id="greeneryCheck"> Озеленение</label>
    </details>

    <details>
        <summary>Территории</summary>
        <label><input type="checkbox" checked id="landuseCheck"> Кварталы</label>
    </details>

    <details>
        <summary>Административное деление</summary>
        <label><input type="checkbox" checked id="boundaryCheck"> Граница района</label>
    </details>

    <details>
    <summary>Подложка</summary>

    <label>
        <input type="radio" name="basemap" id="osmMap" checked>
        Карта
    </label>
    <br>

    <label>
        <input type="radio" name="basemap" id="satMap">
        Спутниковый снимок
    </label>

</details>

</div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="js/map.js"></script>

</body>

</html>
